<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Augmentis — Radar des Domaines de Vie</title>
<style>

  body {

    flex-direction: column;

  }

  .header {

  }

    font-size: 24px;
    font-weight: 800;

    -webkit-text-fill-color: transparent;

  .header .subtitle {
    color: rgba(255,255,255,0.4);

    font-weight: 700;

    cursor: pointer;

  .config-panel input[type="password"],
  .config-panel input[type="text"] {
    width: 100%;
    padding: 8px 12px;
    margin: 6px 0;

    border: 1px solid rgba(255,255,255,0.1);

  .config-panel button {

    color: #fff;

  .config-panel label {

  .status {

    border-radius: 6px;

  .status.ok { background: rgba(34,197,94,0.2); color: #22c55e; }
  .status.err { background: rgba(239,68,68,0.2); color: #ef4444; }

  .footer {

<script>
// ====== DOMAIN CONFIGURATION ======
const DOMAINS_CONFIG = [
  { key: "sante",       name: "Santé",       icon: "💟", color: "#ef4444", notionId: "31a813ec-6209-8156-a685-c591275ed49c" },
  { key: "sociabilite", name: "Sociabilité", icon: "☸️", color: "#3b82f6", notionId: "31a813ec-6209-814a-a4ba-d88ba62b7b16" },
  { key: "enseignement",name: "Enseignement",icon: "⚛️", color: "#eab308", notionId: "31a813ec-6209-8130-b75a-ee6cbe9b4811" },
  { key: "croyances",   name: "Croyances",   icon: "☮️", color: "#22c55e", notionId: "31a813ec-6209-81b6-addf-ea56f0f114df" },
  { key: "possessions", name: "Possessions", icon: "♎️", color: "#ec4899", notionId: "31a813ec-6209-8133-8ce3-c865276c8d30" },
  { key: "securite",    name: "Sécurité",    icon: "🛐", color: "#6b7280", notionId: "31a813ec-6209-811c-ac32-eb1f967753ff" }
];

// Map title text (lowercase) → domain index
const DOMAIN_NAMES_MAP = {
  "santé": 0, "la santé": 0, "sante": 0,
  "sociabilité": 1, "la sociabilité": 1, "sociabilite": 1,
  "enseignement": 2, "l'enseignement": 2,
  "croyances": 3, "les croyances": 3,
  "possessions": 4, "les possessions": 4,
  "sécurité": 5, "la sécurité": 5, "securite": 5
};

// Notion Database IDs for linked databases
const LINKED_DBS = {
  epreuves:        "0f163621-ff65-4e2a-82ce-e0cc6495bc62",
  sessionsFocus:   "f4caecd9-5177-4429-aff3-7459b4fd3e25",
  inventaire:      "7346cb47-f005-464c-a54d-9a04d9a1600e",
  missionsSociete: "9cb0de3b-26e4-4872-b391-34b5daecca6c"
};

let domainLevels = [1, 1, 1, 1, 1, 1];
let domainData = DOMAINS_CONFIG.map(d => ({
  level: 1, totalExp: 0, quests: 0, sessions: 0, missions: 0, notionUrl: ""
}));
let maxLevel = 20;
let refreshInterval = null;

      // Default config (fallback when storage is unavailable, e.g. in Notion iframe)
      const DEFAULT_CONFIG = {
        token: 'ntn_' + '346939970652jndDBJD5T3CFzoL2YLPenjAKZyjv0fL4Wq',
        dbId: 'e66fdaf8-9b77-434e-8f92-27658f751656',
        proxy: 'https://augmentis-proxy.xmedicalx.workers.dev/api'
      };

    // CORS proxy fallback chain for different environments
    const CORS_PROXIES = [
      { url: 'https://corsproxy.io/?', encode: false },
      { url: 'https://api.allorigins.win/raw?url=', encode: true }
    ];

// ====== RADAR DRAWING ======
function drawRadar(levels, animated = true) {
  const canvas = document.getElementById('radar');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = 400;
  canvas.width = W * dpr;
  canvas.height = W * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = W + 'px';
  ctx.scale(dpr, dpr);

  const cx = W / 2, cy = W / 2, radius = 120;
  const n = 6;
  const angleStep = (2 * Math.PI) / n;

  ctx.clearRect(0, 0, W, W);

  // Background
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, W / 2);
  bgGrad.addColorStop(0, '#1a1a2e');
  bgGrad.addColorStop(1, '#0d0d1a');
  ctx.fillStyle = bgGrad;
  ctx.beginPath();
  ctx.roundRect(0, 0, W, W, 16);
  ctx.fill();

  // Grid levels
  for (let l = 1; l <= 5; l++) {
    const r = (l / 5) * radius;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = angleStep * i - Math.PI / 2;
      const px = cx + r * Math.cos(a);
      const py = cy + r * Math.sin(a);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(255,255,255,${0.04 + l * 0.02})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axis lines
  for (let i = 0; i < n; i++) {
    const a = angleStep * i - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + radius * Math.cos(a), cy + radius * Math.sin(a));
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.stroke();
  }

  // Data polygon
  const points = levels.map((lv, i) => {
    const a = angleStep * i - Math.PI / 2;
    const r = (Math.max(lv, 0.3) / maxLevel) * radius;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  });

  // Glow
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#8b5cf6';

  // Fill
  const fillGrad = ctx.createLinearGradient(50, 50, 310, 310);
  fillGrad.addColorStop(0, 'rgba(139,92,246,0.35)');
  fillGrad.addColorStop(1, 'rgba(6,182,212,0.35)');
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.closePath();
  ctx.fillStyle = fillGrad;
  ctx.fill();

  // Stroke
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.closePath();
  ctx.strokeStyle = '#8b5cf6';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Data points + Labels
  points.forEach((p, i) => {
    // Point glow
    ctx.shadowBlur = 8;
    ctx.shadowColor = DOMAINS_CONFIG[i].color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = DOMAINS_CONFIG[i].color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Labels
    const a = angleStep * i - Math.PI / 2;
    const labelR = radius * 1.38;
    const lx = cx + labelR * Math.cos(a);
    const ly = cy + labelR * Math.sin(a);

    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(DOMAINS_CONFIG[i].icon, lx, ly - 8);

    ctx.font = 'bold 10px system-ui, sans-serif';
    ctx.fillStyle = DOMAINS_CONFIG[i].color;
    ctx.fillText(DOMAINS_CONFIG[i].name, lx, ly + 8);

    ctx.font = '9px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(`Lvl ${levels[i]}`, lx, ly + 20);
  });

  // Center text
  ctx.font = 'bold 10px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.textAlign = 'center';
  ctx.fillText('AUGMENTIS', cx, cy - 4);
  ctx.font = '9px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(139,92,246,0.6)';
  ctx.fillText('Interface de vie', cx, cy + 10);
}

// ====== DOMAIN CARDS ======
function renderDomainCards(levels) {
  const grid = document.getElementById('domains-grid');
  grid.innerHTML = '';
  DOMAINS_CONFIG.forEach((d, i) => {
    const pct = Math.min((levels[i] / maxLevel) * 100, 100);
    const titleText = getTitre(levels[i]);
    const dd = domainData[i];
    const notionUrl = `https://www.notion.so/${d.notionId.replace(/-/g, '')}`;

    // Build activity detail line
    const details = [];
    if (dd.quests > 0) details.push(`${dd.quests} épreuves`);
    if (dd.sessions > 0) details.push(`${dd.sessions} sessions`);
    if (dd.missions > 0) details.push(`${dd.missions} missions`);
    const detailStr = details.length > 0 ? details.join(' · ') : '';

    grid.innerHTML += `
      <a class="domain-card" href="${notionUrl}" target="_blank" style="border-left-color:${d.color}">
        <div class="icon">${d.icon}</div>
        <div class="info" style="flex:1">
          <div class="name">${d.name} <span class="link-badge">NOTION ↗</span></div>
          <div class="level-text">Level ${levels[i]} — ${titleText}</div>
          ${detailStr ? `<div class="exp-detail">${detailStr}</div>` : ''}
          <div class="progress-bar">
            <div class="fill" style="width:${pct}%;background:${d.color}"></div>
          </div>
        </div>
      </a>
    `;
  });
}

function getTitre(level) {
  if (level >= 1000) return "Monarch 👑";
  if (level >= 640) return "Grand Marshal 🎖️🎖️";
  if (level >= 320) return "Marshal 🎖️";
  if (level >= 160) return "Commander 🏅";
  if (level >= 80) return "Elite Knight ✴️";
  if (level >= 40) return "Knight ❇️";
  if (level >= 20) return "Elite 🥇";
  if (level >= 10) return "Soldier 🥈";
  return "Beginner 🥉";
}

function getRank(totalLevel) {
  if (totalLevel >= 600) return "SSS+";
  if (totalLevel >= 480) return "SSS";
  if (totalLevel >= 360) return "SS";
  if (totalLevel >= 240) return "S";
  if (totalLevel >= 150) return "A";
  if (totalLevel >= 90) return "B";
  if (totalLevel >= 40) return "C";
  if (totalLevel >= 15) return "D";
  return "E";
}

function updateStats(levels) {
  const total = levels.reduce((a, b) => a + b, 0);
  document.getElementById('total-level').textContent = total;
  document.getElementById('rank-display').textContent = getRank(total);
}

// ====== NOTION API CONNECTION ======
async function connectNotion() {
  const token = document.getElementById('notion-token').value.trim();
  const dbId = document.getElementById('db-id').value.trim();
  const proxy = document.getElementById('cors-proxy').value.trim();
  const statusEl = document.getElementById('status-msg');

  if (!token || !dbId) {
    statusEl.className = 'status err';
    statusEl.textContent = 'Token et Database ID requis';
    return;
  }

  localStorage.setItem('augmentis_token', token);
  localStorage.setItem('augmentis_dbid', dbId);
  localStorage.setItem('augmentis_proxy', proxy);

  statusEl.className = 'status loading';
  statusEl.textContent = 'Connexion en cours...';

  await fetchNotionData(token, dbId, proxy);

  if (document.getElementById('auto-refresh').checked) {
    startAutoRefresh();
  }
}

async function notionQuery(proxy, token, dbId, body) {
      body = body || {};
      var headers = {
        'Authorization': 'Bearer ' + token,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json'
      };
      var bodyStr = JSON.stringify(body);
      var proxiesToTry = [proxy];
      for (var j = 0; j < CORS_PROXIES.length; j++) {
        if (CORS_PROXIES[j].url !== proxy) proxiesToTry.push(CORS_PROXIES[j].url);
      }
      var lastError = null;
      for (var i = 0; i < proxiesToTry.length; i++) {
        var p = proxiesToTry[i];
        try {
          var targetUrl;
          if (p.indexOf('/api') !== -1) {
            targetUrl = p + '/v1/databases/' + dbId + '/query';
          } else {
            var notionUrl = 'https://api.notion.com/v1/databases/' + dbId + '/query';
            targetUrl = p + notionUrl;
          }
          var controller = new AbortController();
          var tid = setTimeout(function() { controller.abort(); }, 8000);
          var r = await fetch(targetUrl, { method: 'POST', headers: headers, body: bodyStr, signal: controller.signal });
          clearTimeout(tid);
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        } catch(e) { lastError = e; console.warn('Proxy failed:', p, e.message); }
      }
      throw new Error('All proxies failed: ' + (lastError ? lastError.message : ''));
    }

    async function fetchNotionData(tkn, dbId, proxy) {
      var statusEl = document.getElementById("status-msg");
      try {
        statusEl.className = "status loading";
        statusEl.textContent = "Chargement des domaines...";
        var domainsData = await notionQuery(proxy, tkn, dbId, { filter: { property: "Main Class", relation: { is_empty: true } } });
        var newLevels = [0, 0, 0, 0, 0, 0];
        var newDD = DOMAINS_CONFIG.map(function() { return { level: 0, totalExp: 0, quests: 0, sessions: 0, missions: 0, inventaire: 0 }; });
        var totalExp = 0, totalAct = 0;
        domainsData.results.forEach(function(page) {
          var tp = page.properties["Domaine de vie zone"];
          var title = "";
          if (tp && tp.title && tp.title[0] && tp.title[0].plain_text) title = tp.title[0].plain_text.toLowerCase().trim();
          var idx = -1;
          for (var k in DOMAIN_NAMES_MAP) { if (title.includes(k) || title === k) { idx = DOMAIN_NAMES_MAP[k]; break; } }
          if (idx >= 0) {
            var lp = page.properties["Level"], ln = 0;
            if (lp && lp.formula && lp.formula.number !== undefined && lp.formula.number !== null) ln = lp.formula.number;
            else if (lp && lp.formula && lp.formula.string) { var m = lp.formula.string.match(/\d+/); if (m) ln = parseInt(m[0], 10); }
            if (ln > 0) { newLevels[idx] = ln; newDD[idx].level = ln; }
            var ep = page.properties["Total EXP"];
            if (ep && ep.rollup && ep.rollup.number != null) { newDD[idx].totalExp = ep.rollup.number; totalExp += ep.rollup.number; }
            var qp = page.properties["Quests"];
            if (qp && qp.relation) { newDD[idx].quests = qp.relation.length; totalAct += qp.relation.length; }
            var sp = page.properties["Sessions de Focus"];
            if (sp && sp.relation) { newDD[idx].sessions = sp.relation.length; totalAct += sp.relation.length; }
            var mp = page.properties["Missions Soci\u00e9t\u00e9"];
            if (mp && mp.relation) { newDD[idx].missions = mp.relation.length; totalAct += mp.relation.length; }
            var ip = page.properties["Inventaire"];
            if (ip && ip.relation) { newDD[idx].inventaire = ip.relation.length; }
          }
        });
        domainLevels = newLevels; domainData = newDD;
        maxLevel = Math.max(20, Math.max.apply(null, newLevels) + 5);
        document.getElementById("total-exp").textContent = totalExp;
        document.getElementById("quests-done").textContent = totalAct;
        drawRadar(domainLevels); renderDomainCards(domainLevels); updateStats(domainLevels);
        var now = new Date().toLocaleTimeString("fr-FR");
        document.getElementById("update-time").textContent = "Mise \u00e0 jour: " + now;
        statusEl.className = "status ok";
        statusEl.innerHTML = "Connect\u00e9 <span class=\"auto-badge\">AUTO<\/span> " + domainsData.results.length + " domaines \u00b7 " + totalAct + " activit\u00e9s \u00b7 " + totalExp + " EXP";
      } catch (err) {
        statusEl.className = "status err";
        statusEl.textContent = "Erreur: " + err.message;
        console.error("Augmentis Error:", err);
      }
    }

    function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  var token, dbId, proxy;
      try {
        token = localStorage.getItem('augmentis_token') || DEFAULT_CONFIG.token;
        dbId = localStorage.getItem('augmentis_dbid') || DEFAULT_CONFIG.dbId;
        proxy = localStorage.getItem('augmentis_proxy') || DEFAULT_CONFIG.proxy;
      } catch(e) {
        token = DEFAULT_CONFIG.token; dbId = DEFAULT_CONFIG.dbId; proxy = DEFAULT_CONFIG.proxy;
      }

  if (token && dbId) {
    refreshInterval = setInterval(() => {
      fetchNotionData(token, dbId, proxy);
    }, 5 * 60 * 1000); // 5 minutes
  }
}

// ====== URL PARAMS MODE ======
function loadFromURLParams() {
  const params = new URLSearchParams(window.location.search);
  let hasParams = false;

  DOMAINS_CONFIG.forEach((d, i) => {
    const val = params.get(d.key);
    if (val !== null) {
      domainLevels[i] = parseInt(val) || 0;
      hasParams = true;
    }
  });

  if (params.get('max')) maxLevel = parseInt(params.get('max')) || 20;

  return hasParams;
}

// ====== INIT ======
function init() {
  const hasParams = loadFromURLParams();

  drawRadar(domainLevels);
  renderDomainCards(domainLevels);
  updateStats(domainLevels);

  // Try auto-connect: URL params > storage > DEFAULT_CONFIG
        const urlP = new URLSearchParams(window.location.search);
        let token, dbId, proxy;
        try {
          token = urlP.get('token') || window.localStorage.getItem('augmentis_token') || DEFAULT_CONFIG.token;
          dbId = urlP.get('dbid') || window.localStorage.getItem('augmentis_dbid') || DEFAULT_CONFIG.dbId;
          proxy = urlP.get('proxy') || window.localStorage.getItem('augmentis_proxy') || DEFAULT_CONFIG.proxy;
        } catch(e) {
          token = urlP.get('token') || DEFAULT_CONFIG.token;
          dbId = urlP.get('dbid') || DEFAULT_CONFIG.dbId;
          proxy = urlP.get('proxy') || DEFAULT_CONFIG.proxy;
        }

        if (token && dbId && !hasParams) {
          document.getElementById('notion-token').value = token;
          document.getElementById('db-id').value = dbId;
          if (proxy) document.getElementById('cors-proxy').value = proxy;
          fetchNotionData(token, dbId, proxy);
          startAutoRefresh();
        }

  // Animate entry
  setTimeout(() => drawRadar(domainLevels), 100);
}

document.addEventListener('DOMContentLoaded', init);
</script>
